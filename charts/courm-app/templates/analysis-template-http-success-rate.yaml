{{- if (and .Values.rollout .Values.rollout.analysis .Values.rollout.analysis.enabled) -}}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: http-success-rate
  annotations:
    # AnalysisTemplate이 먼저 생성되도록 Rollout보다 앞 wave로 배치
    argocd.argoproj.io/sync-wave: "0"
spec:
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.99
      failureLimit: 3
      provider:
        prometheus:
          address: {{ .Values.rollout.analysis.prometheus.address | default "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local" | quote }}
          query: |
            sum(rate(http_requests_total{status!~"5.."}[1m]))
            /
            sum(rate(http_requests_total[1m]))
{{- end }}
