{{- if (and .Values.route .Values.route.enabled) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "courm-app.fullname" . }}
  labels:
    {{- include "courm-app.labels" . | nindent 4 }}
  annotations:
    # service(0) -> rollout(1) 적용 후 route가 붙도록
    argocd.argoproj.io/sync-wave: "2"
spec:
  parentRefs:
    - name: {{ required "route.gatewayName is required" .Values.route.gatewayName }}
      namespace: {{ default "istio-system" .Values.route.gatewayNamespace }}
      {{- with .Values.route.sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}

  {{- with .Values.route.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}

  rules:
    {{- if .Values.strategy.blueGreen.previewHeader.enabled }}
    # [preview 라우팅] 지정한 헤더가 있는 요청은 신버전(preview)으로 전달
    # 예: curl -H "X-Preview: true" https://...
    - matches:
        - path:
            type: {{ default "PathPrefix" .Values.route.pathType }}
            value: {{ required "route.path is required" .Values.route.path | quote }}
          headers:
            - name: {{ .Values.strategy.blueGreen.previewHeader.name | default "X-Preview" | quote }}
              value: {{ .Values.strategy.blueGreen.previewHeader.value | default "true" | quote }}
      backendRefs:
        - name: {{ include "courm-app.fullname" . }}-preview
          port: {{ default 80 .Values.service.port }}
    {{- end }}
    # [일반 라우팅] 헤더 없는 일반 요청은 구버전(active)으로 전달
    - matches:
        - path:
            type: {{ default "PathPrefix" .Values.route.pathType }}
            value: {{ required "route.path is required" .Values.route.path | quote }}
      backendRefs:
        - name: {{ include "courm-app.fullname" . }}-active
          port: {{ default 80 .Values.service.port }}
          weight: {{ default 1 .Values.route.weight }}
{{- end }}
