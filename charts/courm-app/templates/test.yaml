loki:
  # 로그를 S3에 저장
  storage:
    type: s3
  # ingester 장애 시 로그 유실 방지
  ingester:
    wal:
      enabled: true
  limits_config:
    # 초당 로그 수집량 제한
    ingestion_rate_mb: 10
    # 스트림 수 상한
    max_streams_per_user: 10000
    # 로그 보관 기간
    retention_period: 168h
  # 만료 로그 실제 삭제 활성화
  compactor:
    retention_enabled: true

    