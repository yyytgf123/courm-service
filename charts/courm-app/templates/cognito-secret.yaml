{{- if and .Values.cognito .Values.cognito.jwkSetUri }}
apiVersion: v1
kind: Secret
metadata:
  name: cognito-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "courm-app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  COGNITO_JWK_SET_URI: {{ .Values.cognito.jwkSetUri | quote }}
{{- end }}
