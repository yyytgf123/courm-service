apiVersion: v1
kind: Service
metadata:
  name: {{ include "courm-app.fullname" . }}-preview
  labels:
    {{- include "courm-app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: {{ default "ClusterIP" .Values.service.type }}
  selector:
    {{- include "courm-app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ default 80 .Values.service.port }}
      targetPort: http
      protocol: TCP
