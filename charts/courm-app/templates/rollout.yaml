apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "courm-app.fullname" . }}
  labels:
    {{- include "courm-app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: {{ default (default 1 .Values.replicas) .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      {{- include "courm-app.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "courm-app.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ default "latest" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          {{- /* ===== env: (otel/추가 env 존재) 일 때만 생성 ===== */}}
          {{- $otelEnabled := and .Values.otel .Values.otel.enabled }}
          {{- if or $otelEnabled .Values.env }}
          env:
            {{- /* ===== OTEL env (enabled일 때만) ===== */}}
            {{- if $otelEnabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ default (include "courm-app.fullname" .) .Values.otel.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.otel.otlpProtocol | default "http/protobuf" | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.otel.tracesExporter | default "otlp" | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.otel.metricsExporter | default "none" | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.otel.logsExporter | default "none" | quote }}

            {{- if .Values.otel.resourceAttributes }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.otel.resourceAttributes | quote }}
            {{- end }}
            {{- if .Values.otel.sampler }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.otel.sampler | quote }}
            {{- end }}
            {{- if .Values.otel.samplerArg }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.otel.samplerArg | quote }}
            {{- end }}

            {{- /* ===== Java Agent 주입 (Dockerfile에 jar 포함했으니 env만 주면 됨) ===== */}}
            {{- $agentJar := "/otel/opentelemetry-javaagent.jar" }}
            {{- with .Values.otel }}
              {{- with .javaAgent }}
                {{- if .jarPath }}
                  {{- $agentJar = .jarPath }}
                {{- end }}
              {{- end }}
            {{- end }}
            {{- $baseOpts := default "" .Values.javaToolOptions }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ trim (printf "%s -javaagent:%s" $baseOpts $agentJar) | quote }}
            {{- end }}

            {{- /* ===== 기존 사용자 env 유지 ===== */}}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}

          envFrom:
            - configMapRef:
                name: {{ include "courm-app.fullname" . }}-config
            - secretRef:
                name: {{ include "courm-app.fullname" . }}-secret

          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  {{- if .Values.strategy }}
  {{- if eq .Values.strategy.type "blueGreen" }}
  strategy:
    blueGreen:
      activeService: {{ include "courm-app.fullname" . }}-active
      previewService: {{ include "courm-app.fullname" . }}-preview
      autoPromotionEnabled: {{ .Values.strategy.blueGreen.autoPromotionEnabled | default true }}
      scaleDownDelaySeconds: {{ .Values.strategy.blueGreen.scaleDownDelaySeconds | default 300 }}
  {{- end }}
  {{- else }}
  strategy:
    blueGreen:
      activeService: {{ include "courm-app.fullname" . }}-active
      previewService: {{ include "courm-app.fullname" . }}-preview
      autoPromotionEnabled: true
      scaleDownDelaySeconds: 300
  {{- end }}
