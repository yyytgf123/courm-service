{{- if .Values.istio.sidecar.enabled }}
# ── Envoy 사이드카 트레이드오프 해결: egress namespace 범위 제한 ──────
# 기본적으로 Istio는 메시 내 모든 서비스 정보를 각 Envoy에 xDS로 내려줌
# → 서비스 수가 많아질수록 Envoy 메모리/CPU 증가 (사이드카 트레이드오프)
#
# Sidecar 리소스로 egressHosts를 명시하면:
# → 이 서비스가 실제로 호출하는 ns만 xDS 로드 → 불필요한 ns 제거 효과
#
# egressHosts 형식: "<namespace>/<service>" 또는 "<namespace>/*"
#   ./*             : 같은 namespace 내 모든 서비스 (자기 자신 포함)
#   istio-system/*  : gateway, istiod 등
#   monitoring/*    : Prometheus, Otel Collector 등
#   <other-ns>/*    : cross-ns 호출이 있는 경우만 추가
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: {{ include "courm-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "courm-app.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      {{- include "courm-app.selectorLabels" . | nindent 6 }}
  egress:
    - hosts:
      {{- if .Values.istio.sidecar.enabled }}
# ── Envoy 사이드카 트레이드오프 해결: egress namespace 범위 제한 ──────
# 기본적으로 Istio는 메시 내 모든 서비스 정보를 각 Envoy에 xDS로 내려줌
# → 서비스 수가 많아질수록 Envoy 메모리/CPU 증가 (사이드카 트레이드오프)
#
# Sidecar 리소스로 egressHosts를 명시하면:
# → 이 서비스가 실제로 호출하는 ns만 xDS 로드 → 불필요한 ns 제거 효과
#
# egressHosts 형식: "<namespace>/<service>" 또는 "<namespace>/*"
#   ./*             : 같은 namespace 내 모든 서비스 (자기 자신 포함)
#   istio-system/*  : gateway, istiod 등
#   monitoring/*    : Prometheus, Otel Collector 등
#   <other-ns>/*    : cross-ns 호출이 있는 경우만 추가
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: {{ include "courm-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "courm-app.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      {{- include "courm-app.selectorLabels" . | nindent 6 }}
  egress:
    - hosts:
        - "./*"
        - "istio-system/*"
        - "monitoring/*"
  ingress:
    - port:
        number: {{ .Values.service.targetPort | default 8080 }}
        protocol: HTTP
      defaultEndpoint: 0.0.0.0:{{ .Values.service.targetPort | default 8080 }}
{{- end }}

  ingress:
    - port:
        number: {{ .Values.service.targetPort | default 8080 }}
        protocol: HTTP
      defaultEndpoint: 0.0.0.0:{{ .Values.service.targetPort | default 8080 }}
{{- end }}
