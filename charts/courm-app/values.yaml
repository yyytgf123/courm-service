strategy:
  type: blueGreen
  blueGreen:
    # false: 수동 promote 필요 / true: autoPromotionSeconds 경과 후 자동 promote
    autoPromotionEnabled: false
    # preview 유지 시간(초). autoPromotionEnabled: true 일 때만 동작
    # autoPromotionSeconds: 300
    # promote 후 구버전 Pod 제거까지 대기 시간(초)
    scaleDownDelaySeconds: 300
    previewHeader:
      # true로 설정하면 헤더가 있는 요청을 preview(신버전)로 라우팅
      enabled: false
      # 라우팅 판단에 사용할 헤더 이름
      name: X-Preview
      # 라우팅 판단에 사용할 헤더 값
      value: "true"

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    portName: http
    path: /actuator/prometheus
    interval: 15s
    scrapeTimeout: 10s
    scheme: http
    additionalLabels:
      release: kube-prometheus-stack

destinationRule:
  enabled: false
  connectionPool:
    tcp:
      maxConnections: 100
    http:
      http1MaxPendingRequests: 1024
      maxRequestsPerConnection: 1024
  outlierDetection:
    consecutive5xxErrors: 5
    interval: 1m
    baseEjectionTime: 15m
    maxEjectionPercent: 100
