profile: dev

replicas: 1
revisionHistoryLimit: 2


# ------------------------
# Service
# ------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080


# ------------------------
# Redis (Dev)
# ------------------------
redis:
  # Redis 설정은 redis.* 값으로만 주입하고 JAVA_TOOL_OPTIONS의 -Dspring.data.redis.*는 사용하지 않음
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: "app-user"
  password: "AppUser!20260220"
  sslEnabled: true

# ------------------------
# Internal Service URLs (Dev)
# ------------------------
product:
  serviceUrl: http://product-service-dev-courm-app-active

# ------------------------
# Kafka (Dev)
# ------------------------


# ------------------------
# Dev Secrets
# ------------------------
secrets:
  jwtSecret: dev-secret-key

# ------------------------
# Blue/Green 전략 - 개발 환경
# ------------------------
strategy:
  blueGreen:
    autoPromotionEnabled: true
    autoPromotionSeconds: 60
    scaleDownDelaySeconds: 60
    previewHeader:
      enabled: true

# ------------------------
# Gateway API - Development
# ------------------------
route:
  enabled: true
  gatewayName: dev-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "cart-dev.example.com"

# ------------------------
# Resources
# ------------------------
resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"



# ------------------------
# EKS Handoff Notes (2026-02-18)
# ------------------------
# dev values에서도 아래 원칙 동일:
# - kafka.bootstrapServers, redis.host/port, cognito.jwkSetUri 는 값 변경 시 반영됨.
# - PRODUCT_SERVICE_URL 은 2026-02-18 반영 완료(configmap에서 .Values.product.serviceUrl 주입).
#
# 예시(동일 namespace):
# - Product URL: http://product:8080
# - Redis Host: <redis-service-name>
# - Kafka Bootstrap: <kafka-service-name>:9092
