profile: dev

replicas: 1
revisionHistoryLimit: 2

# ------------------------
# Image
# ------------------------
image:
  tag: v1

# ------------------------
# Service
# ------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080


# ------------------------
# Redis (Dev)
# ------------------------


# ------------------------
# Kafka (Dev)
# ------------------------


# ------------------------
# Dev Secrets
# ------------------------
secrets:
  jwtSecret: dev-secret-key

# ------------------------
# Gateway API - Development
# ------------------------
route:
  enabled: true
  gatewayName: dev-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "cart-dev.example.com"

# ------------------------
# Resources
# ------------------------
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

