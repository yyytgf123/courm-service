profile: dev

config:
  serverPort: "8080"
  springDatasourceUrl: "jdbc:postgresql://postgresql:5432/ecommerce"
  dbHost: "postgresql"
  dbPort: "5432"
  dbName: "ecommerce"

secret:
  dbUsername: "postgres"
  dbPassword: "postgres"

replicas: 2
revisionHistoryLimit: 3

# ------------------------
# Image
# ------------------------
image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-cart
  tag: "13-dc0a4c3f"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-secret

# ------------------------
# Service
# ------------------------
service:
  port: 80
  targetPort: 8080
  type: ClusterIP

redis:
  host: local-redis.prod.svc.cluster.local
  port: 6379
  username: "default"
  password: "NewStrongPass123!"
  sslEnabled: true

# ------------------------
# Internal Service URLs 여기 주석
# ------------------------
product:
  serviceUrl: http://product:8080




# ------------------------
# Kafka
# ------------------------
kafka:
  bootstrapServers: courm-kafka.courm-kafka.svc.cluster.local:9092
  consumerGroupId: cart-service-group
  orderTopic: order-events
  paymentTopic: payment-events
  productTopic: product-events

# ------------------------
# Cognito
# ------------------------
cognito:
  jwkSetUri: https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json
  awsJwkSetUri: https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json

# ------------------------
# Gateway API
# ------------------------
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /api/v2/cart
  pathType: PathPrefix
  weight: 1
  hostnames: []

# ------------------------
# Argo Rollouts
# ------------------------
strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

# ------------------------
# Resources
# ------------------------
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# ------------------------
# Prometheus
# ------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# ------------------------
# OpenTelemetry (Tempo)
# ------------------------
otel:
  enabled: false
  serviceName: cart-service
  otlpEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -Dspring.data.redis.host=local-redis.prod.svc.cluster.local
  -Dspring.data.redis.port=6379
  -Dspring.data.redis.ssl.enabled=true
  -Dspring.datasource.hikari.maximum-pool-size=20
  -Dspring.datasource.hikari.connection-timeout=5000
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError



logLevel: INFO

