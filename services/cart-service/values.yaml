env:
  - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
    value: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  - name: SPRING_KAFKA_CONSUMER_GROUP_ID
    value: "order-service-group"
  - name: KAFKA_ORDER_TOPIC
    value: "order-events"
  - name: KAFKA_PAYMENT_TOPIC
    value: "payment-events"
  - name: KAFKA_PRODUCT_TOPIC
    value: "product-events"



replicas: 2
revisionHistoryLimit: 3

# ------------------------
# Image
# ------------------------
image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-cart
  tag: "jh3"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-secret

# ------------------------
# Service
# ------------------------
service:
  port: 80
  targetPort: 8080
  type: ClusterIP


# ------------------------
# Redis
# ------------------------
redis:
  host: redis.commerce.svc.cluster.local
  port: 6379

# ------------------------
# Kafka
# ------------------------
kafka:
  bootstrapServers: kafka.kafka.svc.cluster.local:9092
  consumerGroupId: cart-service-group
  orderTopic: order-events

# ------------------------
# Cognito
# ------------------------
#cognito:
#  region: ap-northeast-2
#  userPoolId: ap-northeast-2_XXXXX

# ------------------------
# Gateway API
# ------------------------
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /api/v2/cart
  pathType: PathPrefix
  weight: 1
  hostnames: []

# ------------------------
# Argo Rollouts
# ------------------------
strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

# ------------------------
# Resources
# ------------------------
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# ------------------------
# Prometheus
# ------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# ------------------------
# OpenTelemetry (Tempo)
# ------------------------
otel:
  enabled: false
  serviceName: cart-service
  otlpEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

javaToolOptions: ""
logLevel: INFO
