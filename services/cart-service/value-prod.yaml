
profile: prod

service:
  type: ClusterIP

service2:
  type: ClusterIP

replicaCount: 1

rollout:
  analysis:
    enabled: true

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

## Gateway API - Production
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "cart.example.com"

## Blue/Green 전략 - 운영 환경
strategy:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 300
    previewHeader:
      enabled: true

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=prod,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"   # 운영은 보통 10% 같은 식으로 낮춤

# ------------------------
# Redis (Dev)
# ------------------------
redis:
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: app-user
  password: NewStrongPass123!
  sslEnabled: true

product:
  serviceUrl: http://product-service-prod-courm-app-active
