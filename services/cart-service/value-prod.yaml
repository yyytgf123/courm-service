
profile: prod

service:
  type: ClusterIP

service2:
  type: ClusterIP

replicaCount: 1

rollout:
  analysis:
    enabled: true

resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"


nodeSelector:
  role: service-app

## Gateway API - Production
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "cart.example.com"

## Blue/Green 전략 - 운영 환경
strategy:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 300
    previewHeader:
      enabled: true

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=prod,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"   # 운영은 보통 10% 같은 식으로 낮춤

# ------------------------
# Redis (Dev)
# ------------------------
redis:
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: "app-user"
  password: "AppUser!20260220"
  sslEnabled: true

product:
  serviceUrl: http://product-service-prod-courm-app-active


## Istio
istio:
  peerAuth:
    enabled: true
    mode: STRICT
  requestAuth:
    enabled: true
    issuer: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T"
    jwksUri: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json"
  authzPolicy:
    enabled: false              # cart는 Gateway를 통해 외부에서 진입
    allowedPrincipals: []
  sidecar:
    enabled: true
    # 단일 ns 구조: ./* 로 같은 ns 내 5개 서비스 모두 포함
    # argocd/jenkins-agents/courm-kafka/kube-system/cert-manager 등 타 ns xDS 제거
    egressHosts:
      - "./*"
      - "istio-system/*"
      - "monitoring/*"

## Route timeouts
route:
  timeouts:
    request: "30s"
    backendRequest: "25s"
  preview:
    timeouts:
      request: "10s"
      backendRequest: "8s"

## DestinationRule (Circuit Breaker)
destinationRule:
  enabled: true
  loadBalancer: ROUND_ROBIN
  connectionPool:
    tcp:
      maxConnections: 100
      connectTimeout: "5s"
    http:
      h2UpgradePolicy: DEFAULT
      http1MaxPendingRequests: 100
      http2MaxRequests: 200
      maxRequestsPerConnection: 10
      maxRetries: 3
  preview:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
  outlierDetection:
    consecutive5xxErrors: 3
    interval: "10s"
    baseEjectionTime: "30s"
    maxEjectionPercent: 50

## HPA (운영 Auto-Scaling)
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 50