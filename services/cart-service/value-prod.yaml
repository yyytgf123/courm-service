
profile: prod

service:
  type: ClusterIP

service2:
  type: ClusterIP

replicaCount: 1

rollout:
  analysis:
    enabled: true

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

## Gateway API - Production
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "cart.example.com"

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=prod,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"   # 운영은 보통 10% 같은 식으로 낮춤
