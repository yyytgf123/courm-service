#image:
#  tag: "18-6675529e"

service:
  type: ClusterIP

service2:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: prod

replicaCount: 1

rollout:
  analysis:
    enabled: true

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

## Gateway API - Production
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "user.example.com"

## Blue/Green 전략 - 운영 환경
# prod는 충분한 검증 후 수동 promote (안전 우선)
strategy:
  blueGreen:
    autoPromotionEnabled: false   # 수동 promote 필요
    scaleDownDelaySeconds: 300
    previewHeader:
      enabled: true               # X-Preview 헤더로 신버전 테스트 가능

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=prod,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"   # 운영은 보통 10% 같은 식으로 낮춤
