## Local docker-compose env mapping
config:
  springKafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  kafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  serverPort: "8080"
  springDatasourceUrl: "jdbc:postgresql://postgres:5432/user_db"
  dbHost: "postgres"
  dbPort: "5432"
  dbName: "user_db"
  awsCognitoRegion: "ap-northeast-2"
  awsCognitoUserPoolId: "ap-northeast-2_HmqfrWP3T"
  awsCognitoJwkSetUri: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json"
  awsCognitoClientId: "7dhk1lsqh5c1v9gqh1evtdlpoq"

secret:
  dbUsername: "postgres"
  dbPassword: "postgres"
  awsCognitoClientSecret: "8iqncgv83mbnmion6f06rlj4mvib1ii0adg7po283g0vss9581p"

## secret
imagePullSecrets:
  - name: ecr-secret

## gateway api
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /api/v2/user
  pathType: PathPrefix
  weight: 1
  hostnames: []

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-user
  tag: "8-6c165693"

replicas: 1

## Argo Rollouts Strategy
strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

## Resource limits (안정적인 성능을 위해 상향)
resources:
  requests:
    memory: "768Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"

revisionHistoryLimit: 3

## Monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# Tempo
otel:
  enabled: false
  serviceName: user-service
  otlpEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

# JVM 실행 옵션을 통한 카프카 주소 강제 주입
javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError
