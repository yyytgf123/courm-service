secret:
  dbUsername: "courmadmin"
  dbPassword: "courmadmin1234!"
  awsCognitoClientSecret: "8iqncgv83mbnmion6f06rlj4mvib1ii0adg7po283g0vss9581p"

## secret
imagePullSecrets:
  - name: ecr-secret

## gateway api
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /api/v2/user
  pathType: PathPrefix
  weight: 1
  hostnames: []

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-user
  tag: "8-6c165693"

replicas: 1

## Argo Rollouts Strategy
strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

## Resource limits (Guaranteed QoS: requests = limits → Evict 방지)
resources:
  requests:
    memory: "1Gi"
    cpu: "1"
  limits:
    memory: "1Gi"
    cpu: "1"

revisionHistoryLimit: 3

## HPA (Auto-Scaling)
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60

## Monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# Tempo
otel:
  enabled: true
  serviceName: user-service
  otlpEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4318" # Assuming we will deploy collector there or use simpler setup
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

# JVM 실행 옵션을 통한 카프카 주소 강제 주입
javaToolOptions: >-
  -javaagent:/otel/opentelemetry-javaagent.jar
  -Dotel.resource.attributes=service.name=user-service
  -Dotel.exporter.otlp.endpoint=http://otel-collector.monitoring.svc.cluster.local:4318
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError
