service:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: dev
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "3"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "1"

config:
  springDatasourceUrl: "jdbc:postgresql://courm-rds-product-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com:5432/courm_product"
  dbHost: "courm-rds-product-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com"
  dbPort: "5432"
  dbName: "courm_product"

secret:
  dbUsername: "courmadmin"
  dbPassword: "courmadmin1234!"

replicas: 1

resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"


## Gateway API - Development
route:
  enabled: true
  gatewayName: dev-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "product-dev.example.com"

## Blue/Green 전략 - 개발 환경
strategy:
  blueGreen:
    autoPromotionEnabled: true
    autoPromotionSeconds: 60
    scaleDownDelaySeconds: 60
    previewHeader:
      enabled: true

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=dev,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "1.0"   # 처음엔 100%로 켜서 잘 들어오는지 확인

# redis
redis:
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: "app-user"
  password: "AppUser!20260220"
  sslEnabled: true

# redis (legacy JVM option)
javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -Dspring.datasource.hikari.maximum-pool-size=3
  -Dspring.datasource.hikari.minimum-idle=1
  -Dspring.datasource.hikari.connection-timeout=5000
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError

hpa:
  maxReplicas: 3
