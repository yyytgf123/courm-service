#image:
#  tag: dev-latest

service:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: dev

replicas: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

## Gateway API - Development
route:
  enabled: true
  gatewayName: dev-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "product-dev.example.com"

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=dev,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "1.0"   # 처음엔 100%로 켜서 잘 들어오는지 확인
