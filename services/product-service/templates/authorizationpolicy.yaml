{{- if .Values.istio.authzPolicy.enabled }}
# product-service: order-service + cart-service SA만 접근 허용
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ .Release.Name }}-allow
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  {{- if .Values.istio.authzPolicy.allowedPrincipals }}
  rules:
    {{- range .Values.istio.authzPolicy.allowedPrincipals }}
    - from:
        - source:
            principals:
              - {{ . | quote }}
    {{- end }}
  {{- end }}
{{- end }}
