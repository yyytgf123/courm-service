## Local docker-compose env mapping
config:
  springKafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  kafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  serverPort: "8080"
  springDatasourceUrl: "jdbc:postgresql://postgres:5432/product_db"
  awsCognitoJwkSetUri: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json"
  dbHost: "postgres"
  dbPort: "5432"
  dbName: "product_db"

secret:
  dbUsername: "postgres"
  dbPassword: "postgres"

redis:
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: "app-user"
  password: "NewStrongPass123!"
  sslEnabled: true

## secret
imagePullSecrets:
  - name: ecr-secret

## gateway api
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /api/v2/product
  pathType: PathPrefix
  weight: 1
  hostnames: []

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-product
  tag: "8-6c165693"

replicas: 1

## Argo Rollouts Strategy
strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

## Resource limits (Guaranteed QoS: requests = limits → Evict 방지)
resources:
  requests:
    memory: "1Gi"
    cpu: "1"
  limits:
    memory: "1Gi"
    cpu: "1"

revisionHistoryLimit: 3

## HPA (Auto-Scaling)
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPU: 50

## Monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# Tempo
otel:
  enabled: true
  serviceName: product-service
  otlpEndpoint: "http://loki-stack.logging.svc.cluster.local:4318" # Assuming we will deploy collector there or use simpler setup
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

podAnnotations:
  sidecar.istio.io/inject: "false"

# JVM 힙 메모리 최적화 옵션
javaToolOptions: >-
  -javaagent:/otel/opentelemetry-javaagent.jar
  -Dotel.resource.attributes=service.name=product-service
  -Dotel.exporter.otlp.endpoint=http://loki-stack.logging.svc.cluster.local:4318
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError
