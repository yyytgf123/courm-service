## Local docker-compose env mapping
config:
  springKafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  kafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  serverPort: "8080"
  springDatasourceUrl: "jdbc:postgresql://courm-rds-product-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com:5432/courm_product"
  awsCognitoJwkSetUri: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json"
  dbHost: "courm-rds-product-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com"
  dbPort: "5432"
  dbName: "courm_product"

secret:
  dbUsername: "courmadmin"
  dbPassword: "courmadmin1234!"

redis:
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: "app-user"
  password: "AppUser!20260220"
  sslEnabled: true

## secret
imagePullSecrets:
  - name: ecr-secret

## gateway api
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /api/v2/product
  pathType: PathPrefix
  weight: 1
  hostnames: []

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-product
  tag: "10-f3b69a70"

replicas: 1

## Argo Rollouts Strategy
strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

## Resource limits (Guaranteed QoS: requests = limits → Evict 방지)
resources:
  requests:
    memory: "1Gi"
    cpu: "1"
  limits:
    memory: "1Gi"
    cpu: "1"

revisionHistoryLimit: 3

## HPA — KEDA로 대체됨
hpa:
  enabled: false

## KEDA ScaledObject
## - CPU 60% / Memory 75%: 리소스 기반 확장
## - Prometheus p95 > 500ms: order가 호출하는 선행 서비스 병목 선제 확장
keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 3
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
    cpu:
      enabled: true
      threshold: "60"
    memory:
      enabled: true
      threshold: "75"
    prometheus:
      enabled: true
      serverAddress: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
      metricName: http_request_p95_latency_product
      query: >-
        histogram_quantile(0.95,
          sum(rate(http_server_requests_seconds_bucket{job="product-service"}[2m]))
          by (le))
      threshold: "0.5"

## Monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# Tempo
otel:
  enabled: true
  serviceName: product-service
  otlpEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4318" # Assuming we will deploy collector there or use simpler setup
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

podAnnotations:
  sidecar.istio.io/inject: "false"

# JVM 힙 메모리 최적화 옵션
javaToolOptions: >-
  -javaagent:/otel/opentelemetry-javaagent.jar
  -Dotel.resource.attributes=service.name=product-service
  -Dotel.exporter.otlp.endpoint=http://otel-collector.monitoring.svc.cluster.local:4318
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError
