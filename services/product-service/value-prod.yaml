#image:
#  tag: "18-6675529e"

service:
  type: ClusterIP

service2:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: prod

replicaCount: 1

rollout:
  analysis:
    enabled: true

resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"


nodeSelector:
  role: service-app

## Gateway API - Production
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "product.example.com"

## Blue/Green 전략 - 운영 환경
strategy:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 300
    previewHeader:
      enabled: true

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=prod,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"   # 운영은 보통 10% 같은 식으로 낮춤

# redis
redis:
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: "app-user"
  password: "AppUser!20260220"
  sslEnabled: true

# redis (legacy JVM option)
javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -Dspring.datasource.hikari.maximum-pool-size=20
  -Dspring.datasource.hikari.connection-timeout=5000
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError

## Istio
istio:
  peerAuth:
    enabled: true
    mode: STRICT
  requestAuth:
    enabled: true
    issuer: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T"
    jwksUri: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json"
  authzPolicy:
    enabled: true
    allowedPrincipals:
      # order-service (재고 차감/복구), cart-service (상품 조회) SA만 허용
      - "cluster.local/ns/order/sa/default"
      - "cluster.local/ns/cart/sa/default"
  sidecar:
    enabled: true
    # 단일 ns 구조: ./* 로 같은 ns 내 5개 서비스 모두 포함
    # argocd/jenkins-agents/courm-kafka/kube-system/cert-manager 등 타 ns xDS 제거
    egressHosts:
      - "./*"
      - "istio-system/*"
      - "monitoring/*"

## Route timeouts
route:
  timeouts:
    request: "30s"
    backendRequest: "25s"
  preview:
    timeouts:
      request: "10s"
      backendRequest: "8s"

## DestinationRule (Circuit Breaker)
destinationRule:
  enabled: true
  loadBalancer: ROUND_ROBIN
  connectionPool:
    tcp:
      maxConnections: 100
      connectTimeout: "5s"
    http:
      h2UpgradePolicy: DEFAULT
      http1MaxPendingRequests: 100
      http2MaxRequests: 200
      maxRequestsPerConnection: 10
      maxRetries: 3
  preview:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
  outlierDetection:
    consecutive5xxErrors: 3
    interval: "10s"
    baseEjectionTime: "30s"
    maxEjectionPercent: 50

## HPA (운영 Auto-Scaling)
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPU: 50
