#image:
#  tag: "18-6675529e"

service:
  type: ClusterIP

service2:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: prod

replicaCount: 1

rollout:
  analysis:
    enabled: true

resources:
  requests:
    cpu: "500m"
    memory: "768Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

## Gateway API - Production
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "product.example.com"

## Blue/Green 전략 - 운영 환경
strategy:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 300
    previewHeader:
      enabled: true

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=prod,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"   # 운영은 보통 10% 같은 식으로 낮춤

# redis
redis:
  host: master.courm-redis-prod.epf9hv.apn2.cache.amazonaws.com
  port: 6379
  username: "app-user"
  password: "AppUser!20260220"
  sslEnabled: true

# redis (legacy JVM option)
javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -Dspring.datasource.hikari.maximum-pool-size=20
  -Dspring.datasource.hikari.connection-timeout=5000
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError
