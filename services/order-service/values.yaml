## 통합 환경 변수 설정
env:
  - name: DB_HOST
    value: "postgresql"
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "ecommerce"
  - name: SPRING_DATASOURCE_USERNAME
    value: "postgres"
  - name: SPRING_DATASOURCE_PASSWORD
    value: "postgres"
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "5"
  - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
    value: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  - name: SPRING_KAFKA_CONSUMER_GROUP_ID
    value: "order-service-group"
  - name: KAFKA_ORDER_TOPIC
    value: "order-events"
  - name: KAFKA_PAYMENT_TOPIC
    value: "payment-events"
  - name: KAFKA_PRODUCT_TOPIC
    value: "product-events"
  - name: AWS_COGNITO_REGION
    value: "ap-northeast-2"
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"

imagePullSecrets:
  - name: ecr-secret

## gateway api
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system

  # /api 아래는 전부 Istio로
  path: /api
  pathType: PathPrefix
  weight: 1

  # Host 기반 라우팅
  hostnames:
    - order.example.com

  # /api prefix 제거해서 앱에 원래 경로로 전달
  # /api/actuator/health  ->  /actuator/health
  # /api/v2/orders/...    ->  /v2/orders/... (앱이 /api/v2/...를 기대하면 아래 replace를 "/api"로 바꾸면 됨)
  urlRewrite:
    enabled: true
    replacePrefixMatch: "/"

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-order
  tag: "13-dc0a4c3f"

replicas: 1

strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

resources:
  requests:
    memory: "768Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"

revisionHistoryLimit: 3

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

otel:
  enabled: false
  serviceName: order-service
  otlpEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError
