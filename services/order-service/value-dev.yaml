#image:
#  tag: dev-latest

service:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: dev
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "3"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "1"

replicas: 1

resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"



nodeSelector:
  role: service-app

## Gateway API - Development
route:
  enabled: true
  gatewayName: dev-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "order-dev.example.com"

## Blue/Green 전략 - 개발 환경
strategy:
  blueGreen:
    autoPromotionEnabled: true
    autoPromotionSeconds: 60
    scaleDownDelaySeconds: 60
    previewHeader:
      enabled: true

config:
  userServiceUrl: http://user-service-dev-courm-app-active
  productServiceUrl: http://product-service-dev-courm-app-active
  springDatasourceUrl: "jdbc:postgresql://courm-rds-order-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com:5432/courm_order"
  dbHost: "courm-rds-order-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com"
  dbPort: "5432"
  dbName: "courm_order"

secret:
  dbUsername: "courmadmin"
  dbPassword: "courmadmin1234!"

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=dev,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "1.0"   # 처음엔 100%로 켜서 잘 들어오는지 확인

redis:
  host: local-redis.dev.svc.cluster.local
  port: 6379
  username: "app-user"
  password: "NewStrongPass123!"
  sslEnabled: false

# redis (legacy JVM option)
javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -Dspring.data.redis.host=local-redis.dev.svc.cluster.local
  -Dspring.data.redis.port=6379
  -Dspring.data.redis.username=app-user
  -Dspring.data.redis.password=NewStrongPass123!
  -Dspring.datasource.hikari.maximum-pool-size=3
  -Dspring.datasource.hikari.minimum-idle=1
  -Dspring.datasource.hikari.connection-timeout=5000
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError

hpa:
  maxReplicas: 3
