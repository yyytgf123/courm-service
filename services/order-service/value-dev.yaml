#image:
#  tag: dev-latest

service:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: dev
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "3"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "1"

replicas: 1

resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"



nodeSelector:
  role: service-app

## Gateway API - Development
route:
  enabled: true
  gatewayName: dev-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "order-dev.example.com"

## Blue/Green 전략 - 개발 환경
strategy:
  blueGreen:
    autoPromotionEnabled: true
    autoPromotionSeconds: 60
    scaleDownDelaySeconds: 60
    previewHeader:
      enabled: true

config:
  userServiceUrl: http://user-service-dev-courm-app-active
  productServiceUrl: http://product-service-dev-courm-app-active
  springDatasourceUrl: "jdbc:postgresql://courm-rds-order-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com:5432/courm_order"
  dbHost: "courm-rds-order-prod.c9iosg68k3c4.ap-northeast-2.rds.amazonaws.com"
  dbPort: "5432"
  dbName: "courm_order"

secret:
  dbUsername: "courmadmin"
  dbPassword: "courmadmin1234!"

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=dev,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "1.0"   # 처음엔 100%로 켜서 잘 들어오는지 확인

redis:
  host: local-redis.dev.svc.cluster.local
  port: 6379
  username: "app-user"
  password: "NewStrongPass123!"
  sslEnabled: false

# Redis 옵션(필요 시 활성화)
# -Dspring.data.redis.host=local-redis.dev.svc.cluster.local
# -Dspring.data.redis.port=6379
# -Dspring.data.redis.username=app-user
# -Dspring.data.redis.password=NewStrongPass123!

javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -Dspring.datasource.hikari.maximum-pool-size=3
  -Dspring.datasource.hikari.minimum-idle=1
  -Dspring.datasource.hikari.connection-timeout=5000
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError

hpa:
  enabled: false      # KEDA 사용으로 비활성화

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 3
  pollingInterval: 15
  cooldownPeriod: 300
  consumerGroup: order-service-group
  topic: payment-events,product-events
  # ──────────────────────────────────────────────────────────────
  # lagThreshold 근거 (2026-03-24 로컬 측정 기반)
  #
  # [측정 환경]
  #   - PostgreSQL: 로컬 컨테이너 (네트워크 지연 <0.1ms)
  #   - 부하: 10→30→60→100 TPS 단계 투입 (PAYMENT_FAILED 이벤트)
  #   - 컨슈머: Python 시뮬레이터 (DB SELECT+UPDATE 실제 실행)
  #
  # [측정 결과]
  #   avg_db_ms (Phase4 steady state) = 6~8ms  ← 핵심 지표
  #   실제 lag 누적 속도:
  #     10 TPS 투입  → +3~4 msg/s (소비 6~7 TPS, Python 오버헤드)
  #     30 TPS 투입  → +10~12 msg/s
  #     60 TPS 투입  → +19~22 msg/s
  #     100 TPS 투입 → +33~35 msg/s
  #
  # [Spring Boot 실제 처리량 추정]
  #   측정 avg_db_ms (로컬) ≈ 6.5ms
  #   +RDS 네트워크(동일 AZ) ≈ +2ms = 8.5ms/message
  #   +JPA/Spring 오버헤드   ≈ +1.5ms = 10ms/message
  #   → 이론 처리량 = 1000ms/10ms = 100 TPS/pod
  #   → 보수 추정 (GC·rebalance 포함): 80~100 TPS/pod
  #
  # [lagThreshold = 80 TPS × 5s 허용지연 = 400 → 500으로 올림림]
  #   500 lag = 단일 pod 기준 ~5초 분량 backlog
  #   KEDA pollingInterval=15s 내에서 감지 → 2번째 pod 투입
  #   maxReplicas=3: 최대 300 TPS 처리 가능
  # ──────────────────────────────────────────────────────────────
  lagThreshold: "500"
  activationLagThreshold: "10"
