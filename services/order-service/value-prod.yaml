#image:
#  tag: "18-6675529e"

service:
  type: ClusterIP

service2:
  type: ClusterIP

env:
  - name: SPRING_PROFILES_ACTIVE
    value: prod

replicaCount: 1

rollout:
  analysis:
    enabled: true

resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"


nodeSelector:
  role: service-app

## Gateway API - Production
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /
  pathType: PathPrefix
  weight: 1
  hostnames:
    - "order.example.com"

## Blue/Green м†ДлЮµ - мЪімШБ нЩШк≤љ
strategy:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 300
    previewHeader:
      enabled: true

config:
  userServiceUrl: http://user-service-prod-courm-app-active
  productServiceUrl: http://product-service-prod-courm-app-active

# Tempo
otel:
  enabled: true
  resourceAttributes: "deployment.environment=prod,service.version=1.0.0"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"   # мЪімШБмЭА л≥інЖµ 10% к∞ЩмЭА мЛЭмЬЉл°Ь лВЃмґ§

## Istio
istio:
  peerAuth:
    enabled: true
    mode: STRICT
  requestAuth:
    enabled: true
    issuer: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T"
    jwksUri: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json"
  authzPolicy:
    enabled: false              # orderлКФ Gatewayл•Љ нЖµнХі мЩЄлґАмЧРмДЬ мІДмЮЕ вЖТ JWTл°Ь 1м∞® к≤Ам¶Э
    allowedPrincipals: []
  sidecar:
    enabled: true
    # лЛ®мЭЉ ns кµђм°∞: ./* л°Ь к∞ЩмЭА ns лВі 5к∞Ь мДЬлєДмК§ л™®лСР нПђнХ®
    # argocd/jenkins-agents/courm-kafka/kube-system/cert-manager лУ± нГА ns xDS м†Ьк±∞
    egressHosts:
      - "./*"
      - "istio-system/*"
      - "monitoring/*"

## Route timeouts
route:
  timeouts:
    request: "30s"
    backendRequest: "25s"
  preview:
    timeouts:
      request: "10s"
      backendRequest: "8s"

## DestinationRule (Circuit Breaker)
destinationRule:
  enabled: true
  loadBalancer: ROUND_ROBIN
  connectionPool:
    tcp:
      maxConnections: 100
      connectTimeout: "5s"
    http:
      h2UpgradePolicy: DEFAULT
      http1MaxPendingRequests: 100
      http2MaxRequests: 200
      maxRequestsPerConnection: 10
      maxRetries: 3
  preview:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
  outlierDetection:
    consecutive5xxErrors: 5
    interval: "10s"
    baseEjectionTime: "30s"
    maxEjectionPercent: 50

## HPA (мЪімШБ Auto-Scaling)
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 30
          periodSeconds: 60
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: External
      external:
        metric:
          name: kafka_consumergroup_lag_sum
          selector:
            matchLabels:
              consumergroup: order-service-group
        target:
          type: Value
          value: "1000"
