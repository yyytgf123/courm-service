{{- if .Values.destinationRule.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ .Release.Name }}-active
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  host: {{ .Release.Name }}-active
  trafficPolicy:
    loadBalancer:
      simple: {{ .Values.destinationRule.loadBalancer | default "ROUND_ROBIN" }}
    connectionPool:
      tcp:
        maxConnections: {{ .Values.destinationRule.connectionPool.tcp.maxConnections | default 100 }}
        connectTimeout: {{ .Values.destinationRule.connectionPool.tcp.connectTimeout | default "5s" | quote }}
      http:
        h2UpgradePolicy: {{ .Values.destinationRule.connectionPool.http.h2UpgradePolicy | default "DEFAULT" }}
        http1MaxPendingRequests: {{ .Values.destinationRule.connectionPool.http.http1MaxPendingRequests | default 100 }}
        http2MaxRequests: {{ .Values.destinationRule.connectionPool.http.http2MaxRequests | default 200 }}
        maxRequestsPerConnection: {{ .Values.destinationRule.connectionPool.http.maxRequestsPerConnection | default 10 }}
        maxRetries: {{ .Values.destinationRule.connectionPool.http.maxRetries | default 3 }}
    outlierDetection:
      consecutive5xxErrors: {{ .Values.destinationRule.outlierDetection.consecutive5xxErrors | default 5 }}
      interval: {{ .Values.destinationRule.outlierDetection.interval | default "10s" | quote }}
      baseEjectionTime: {{ .Values.destinationRule.outlierDetection.baseEjectionTime | default "30s" | quote }}
      maxEjectionPercent: {{ .Values.destinationRule.outlierDetection.maxEjectionPercent | default 50 }}
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ .Release.Name }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  host: {{ .Release.Name }}-preview
  trafficPolicy:
    loadBalancer:
      simple: {{ .Values.destinationRule.loadBalancer | default "ROUND_ROBIN" }}
    connectionPool:
      tcp:
        maxConnections: {{ .Values.destinationRule.preview.connectionPool.tcp.maxConnections | default 50 }}
        connectTimeout: {{ .Values.destinationRule.connectionPool.tcp.connectTimeout | default "5s" | quote }}
      http:
        h2UpgradePolicy: {{ .Values.destinationRule.connectionPool.http.h2UpgradePolicy | default "DEFAULT" }}
        http1MaxPendingRequests: {{ .Values.destinationRule.preview.connectionPool.http.http1MaxPendingRequests | default 50 }}
        http2MaxRequests: {{ .Values.destinationRule.preview.connectionPool.http.http2MaxRequests | default 100 }}
        maxRequestsPerConnection: {{ .Values.destinationRule.connectionPool.http.maxRequestsPerConnection | default 10 }}
        maxRetries: {{ .Values.destinationRule.connectionPool.http.maxRetries | default 3 }}
    outlierDetection:
      consecutive5xxErrors: {{ .Values.destinationRule.outlierDetection.consecutive5xxErrors | default 5 }}
      interval: {{ .Values.destinationRule.outlierDetection.interval | default "10s" | quote }}
      baseEjectionTime: {{ .Values.destinationRule.outlierDetection.baseEjectionTime | default "30s" | quote }}
      maxEjectionPercent: {{ .Values.destinationRule.outlierDetection.maxEjectionPercent | default 50 }}
{{- end }}
