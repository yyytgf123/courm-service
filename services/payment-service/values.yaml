## Local docker-compose env mapping
config:
  springKafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  kafkaBootstrapServers: "courm-kafka.courm-kafka.svc.cluster.local:9092"
  serverPort: "8080"
  springDatasourceUrl: "jdbc:postgresql://postgres:5432/payment_db"
  awsCognitoJwkSetUri: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_HmqfrWP3T/.well-known/jwks.json"
  dbHost: "postgres"
  dbPort: "5432"
  dbName: "payment_db"

secret:
  dbUsername: "postgres"
  dbPassword: "postgres"

## secret
imagePullSecrets:
  - name: ecr-secret

## gateway api
route:
  enabled: true
  gatewayName: prod-gw
  gatewayNamespace: istio-system
  path: /api/v2/payments
  pathType: PathPrefix
  weight: 1
  hostnames: []

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

image:
  repository: 900808296075.dkr.ecr.ap-northeast-2.amazonaws.com/goorm-payment
  tag: "4-365b3684"

replicas: 1

## Argo Rollouts Strategy
strategy:
  type: blueGreen
  blueGreen:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 300

## Resource limits (안정적인 트랜잭션 처리를 위해 상향)
resources:
  requests:
    memory: "768Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"

revisionHistoryLimit: 3

## Monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# Tempo
otel:
  enabled: true
  serviceName: payment-service
  otlpEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"
  otlpProtocol: "http/protobuf"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  javaAgent:
    jarPath: "/otel/opentelemetry-javaagent.jar"

## Istio DestinationRule
## (Circuit Breaker)
destinationRule:
  enabled: true
  connectionPool:
    tcp:
      maxConnections: 100
    http:
      http1MaxPendingRequests: 10
      maxRequestsPerConnection: 1
  outlierDetection:
    consecutive5xxErrors: 5
    interval: 10s
    baseEjectionTime: 30s
    maxEjectionPercent: 100

# JVM 컨테이너 인식 옵션 및 메모리 효율화
javaToolOptions: >-
  -Dspring.kafka.bootstrap-servers=courm-kafka.courm-kafka.svc.cluster.local:9092
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:+ExitOnOutOfMemoryError
